function timeStatus(p) {
const now = new Date();
const s = new Date(p.startDate), e = new Date(p.endDate);
const ds = Math.floor((s-now)/86400000), de = Math.floor((e-now)/86400000);
if (de < 0) return '완료';
if (ds <= 0 && de >= 0) return '진행중';
if (ds <= 7)  return '예정_1주';
if (ds <= 14) return '예정_2주';
return '예정';
}
function enrich(p) {
const ts = timeStatus(p);
const dmap = getDMAP();
const defs = (dmap[p.code]||[]).map(id => DB.defects.find(d=>d.id===id)).filter(Boolean);
return Object.assign({},p,{ts:ts,defs:defs});
}
function getRiskProcs() {
return DB.processes.map(enrich)
.filter(p => p.ts !== '완료' && p.defs.length > 0)

}

function donutChart(title, segments) {

const items = segments.map(s => '<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">' +
'<div style="width:12px;height:12px;border-radius:3px;background:' + s.color + ';flex-shrink:0"></div>' +

'<div style="font-size:12px;font-weight:700;color:var(--t9)">' + s.val + '</div>' +
'</div>').join('');
const pct = segments.map(s => (Object.assign({},s,{pct:total>0?Math.round(s.val/total*100):0})));
const bars = '<div style="display:flex;height:16px;border-radius:8px;overflow:hidden;margin-bottom:14px">' +
pct.map(s => s.pct > 0 ? '<div style="width:' + s.pct + '%;background:' + s.color + '" title="' + s.label + ': ' + s.pct + '%"></div>' : '').join('') +
'</div>';
return '<div class="ch-card"><div style="font-size:13px;font-weight:700;color:var(--t9);margin-bottom:12px">' + title + '</div>' + bars + items + '</div>';
}

.then(function(json){
if(json.success){addSyncLog('✅ 동기화 완료');if(dir==='pull'&&json.data)applySyncData(target,json.data);toast('동기화 완료','ok');}
else{addSyncLog('❌ 오류: '+(json.error||'알 수 없음'));toast('동기화 실패','err');}
})
.catch(function(e){addSyncLog('❌ 연결 오류: '+e.message);toast('동기화 연결 실패','err');});
}function applySyncData(t,data){if(t==='processes'&&Array.isArray(data))DB.processes=data;if(t==='checklists'&&Array.isArray(data))DB.checklists=data;if(t==='defects'&&Array.isArray(data))DB.defects=data;if(t==='sites'&&Array.isArray(data)){DB.sites=data;buildSiteSel();}if(data&&data.sites){DB.sites=data.sites;DB.processes=data.processes;DB.defects=data.defects;DB.checklists=data.checklists;buildSiteSel();}DB.riskProcs=getRiskProcs();renderAll();}function exportGantt(){
const sm=smMap(),list=filtered(DB.processes.map(enrich));
if(!list.length){toast('내보낼 데이터가 없습니다.','err');return;}
const rows=[['공종ID','현장명','공종명','공종코드','시작일','종료일','진행률','담당업체','담당자','상태']];
list.forEach(p=>rows.push([p.id,sm[p.siteId]||p.siteId,p.name,p.code,p.startDate,p.endDate,p.progress,p.company||'',p.manager||'',p.ts]));
downCSV(rows.map(r=>r.join(',')).join('\n'),'gantt_'+new Date().toISOString().split('T')[0]+'.csv');
toast('CSV로 내보내졌습니다.','ok');
}
const PANEL_TITLES={dashboard:'📊 대시보드',risk:'⚠️ 주요 하자 공종 현황',gantt:'📅 공정 간트 차트',checklist:'✅ 체크리스트 관리',defects:'🔍 하자유형 관리',sites:'🏗️ 현장 관리',stats:'📈 통계 분석',alerts:'🔔 알림 현황'};
function nav(name,btn){
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));
const p=document.getElementById('panel-'+name);if(p)p.classList.add('on');
document.getElementById('topTitle').textContent=PANEL_TITLES[name]||name;
if(btn){btn.classList.add('on');}else{document.querySelectorAll('.sb-btn').forEach(b=>{if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+name+"'"))b.classList.add('on');});}
document.getElementById('sb').classList.remove('open');
}
function setRF(btn,f){document.querySelectorAll('#riskFb .fb').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');DB.riskF=f;rRisk();}
function setAF(btn,f){document.querySelectorAll('#panel-alerts .fb').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');DB.alertF=f;rAlerts();}
function onSiteFilter(){DB.selSite=gv('siteSel');rDash();rRisk();rGantt();}
function filterBySite(id){DB.selSite=id;document.getElementById('siteSel').value=id;rDash();rRisk();rGantt();}
function buildSiteSel(){const sel=document.getElementById('siteSel');const prev=sel.value;sel.innerHTML='<option value="all">전체 현장</option>'+DB.sites.map(s=>'<option value="'+s.id+'">'+s.name+'</option>').join('');if(prev)sel.value=prev;}
function toggleSb(){document.getElementById('sb').classList.toggle('open');}
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
function openSheet(){}
function refreshApp(){document.getElementById('loading').style.display='flex';setTimeout(()=>{DB.riskProcs=getRiskProcs();autoGenAlerts();renderAll();document.getElementById('loading').style.display='none';},400);}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function smMap(){const m={};DB.sites.forEach(s=>m[s.id]=s.name);return m;}
function filtered(list){return DB.selSite==='all'?list:list.filter(x=>x.siteId===DB.selSite);}
function escQ(s){return(s||'').replace(/'/g,"\\'");}
function pcColor(ts){return{진행중:'#DC4C4C',예정_1주:'#E8721C',예정_2주:'#D9A000',예정:'#3B6CE0',완료:'#22A85E'}[ts]||'#7050D8';}
function stsBdg(ts){const m={진행중:['br','🔴 진행중'],예정_1주:['bo','🟠 1주내'],예정_2주:['by','🟡 2주내'],예정:['bb','⚪ 예정'],완료:['bg','✅ 완료']};const x=m[ts]||['bx',ts];return '<span class="bdg '+x[0]+'">'+x[1]+'</span>';}
function rkBdg(lv){const m={상:['br','위험 상'],중:['bo','위험 중'],하:['bg','위험 하']};const x=m[lv]||['bx',lv];return '<span class="bdg '+x[0]+'">'+x[1]+'</span>';}
function ligBdg(lf){return{매우높음:'br',높음:'bo',중간:'by',낮음:'bx'}[lf]||'bx';}
function alEmoji(t){const m={'고위험_진행중':'🔴','2주전_예방점검':'⏰','7일전_예방점검':'⏰','시공시작_당일':'🚨'};return m[t]||'📢';}
function alLabel(t){const m={'고위험_진행중':'고위험 진행 중','2주전_예방점검':'2주 전 예방 점검','7일전_예방점검':'7일 전 예방 점검','시공시작_당일':'시공 당일'};return m[t]||t;}
function iBox(lbl,val){return '<div class="ibox"><div class="ibox-l">'+lbl+'</div><div class="ibox-v">'+val+'</div></div>';}
function toast(msg,type){
const ic={ok:'✅',err:'❌',info:'ℹ️'};
const el=document.createElement('div');
el.className='toast '+(type||'info');
el.innerHTML='<span>'+(ic[type]||'📢')+'</span><span>'+msg+'</span>';
document.getElementById('toastWrap').appendChild(el);
setTimeout(()=>el.remove(),3000);
}function downCSV(csv,filename){
const a=document.createElement('a');
a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
a.download=filename; a.click();
}
document.querySelectorAll('.ov').forEach(ov=>{ov.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});
init();



</script>
